{% extends 'base.html' %}
{% block content %}
<div class="mb-6 flex items-center gap-4">
  <a href="javascript:history.back()" class="text-gray-500 hover:text-gray-300 text-sm">← Voltar</a>
  <h2 class="font-display text-2xl font-bold text-white">{{ title }}</h2>
</div>
<div class="card max-w-2xl p-6">
  <form method="post" class="space-y-5">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm text-gray-400 mb-1.5">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p class="text-red-400 text-xs mt-1">{{ field.errors|join:", " }}</p>{% endif %}
      {% if field.help_text %}<p class="text-gray-600 text-xs mt-1">{{ field.help_text }}</p>{% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary">Salvar</button>
      <a href="javascript:history.back()" class="btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
